name: Build & Pre-Release

on:
  push:
    branches:
      - dev
    paths:
      - 'app/**'
      - 'core/**'
      - 'build.gradle**'
      - 'gradle/**'
      - '**.kt'
      - '**.kts'
      - '**.java'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle


      - name: Extract versionName
        id: version
        run: |
          VER=$(grep "VERSION_NAME" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "versionName=$VER" >> $GITHUB_OUTPUT
          echo "Detected versionName: $VER"

      # Decode keystore
      - name: Decode keystore
        env:
          KEYSTORE_FILE_B64: ${{ secrets.KEYSTORE_FILE_B64 }}
        run: echo "$KEYSTORE_FILE_B64" | base64 -d > my-release-key.jks

      - name: Export signing env
        run: |
          {
            echo "KEYSTORE_FILE=$PWD/my-release-key.jks"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
          } >> $GITHUB_ENV

      - name: Build Release APK
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: ./gradlew lintBetaRelease assembleBetaRelease assembleBetaUnminifiedRelease assembleBetaDebuggableRelease assembleBetaDebug --parallel --no-daemon --build-cache

      - name: Rename APKs with version
        run: |
          VER="${{ steps.version.outputs.versionName }}"
          RUN="${{ github.run_number }}"
          MIN="DragonLauncher-v${VER}-${RUN}.apk"
          UNMIN="DragonLauncher-v${VER}-${RUN}-unminified.apk"
          DEBUG="DragonLauncher-v${VER}-${RUN}-debuggable.apk"

          mv app/build/outputs/apk/beta/release/app-beta-release.apk "$MIN"
          mv app/build/outputs/apk/beta/unminifiedRelease/app-beta-unminifiedRelease.apk "$UNMIN"
          mv app/build/outputs/apk/beta/debuggableRelease/app-beta-debuggableRelease.apk "$DEBUG"
          
          {
            echo "APK_MIN=$MIN"
            echo "APK_UNMIN=$UNMIN"
            echo "APK_DEBUG=$DEBUG"
            echo "TAG_NAME=v${VER}-beta-${RUN}"
          } >> $GITHUB_ENV

      # Create tag before release
      - name: Create tag
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Upload pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          prerelease: true
          files: |
            ${{ env.APK_MIN }}
            ${{ env.APK_UNMIN }}
            ${{ env.APK_DEBUG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
